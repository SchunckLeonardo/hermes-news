spring:
  application:
    name: hermes-news
  config:
    import: optional:file:.env[.properties]
  profiles:
    default: local
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    locations: classpath:db/migration
  data:
    redis:
      repositories:
        enabled: false
  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        options:
          model: ${OLLAMA_MODEL:qwen3}
          temperature: ${OLLAMA_TEMPERATURE:0.2}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

app:
  ai:
    provider: ${AI_PROVIDER:ollama}
    summary-timeout: ${AI_SUMMARY_TIMEOUT:20s}
  scheduler:
    digest-check-cron: ${APP_DIGEST_CHECK_CRON:0 * * * * *}
    zone: ${APP_SCHEDULER_ZONE:America/Sao_Paulo}
  rss:
    feeds: ${RSS_FEEDS:https://openai.com/news/rss.xml,https://www.infoq.com/feed/,https://hnrss.org/frontpage}
    max-response-size: ${RSS_MAX_RESPONSE_SIZE:2MB}
  hacker-news:
    base-url: ${HACKER_NEWS_BASE_URL:https://hacker-news.firebaseio.com/v0}
    max-items: ${HACKER_NEWS_MAX_ITEMS:10}
  ranking:
    keywords: ${RANKING_KEYWORDS:ai,artificial intelligence,java,spring,backend,cloud,devops,security,postgres,redis}
    official-sources: ${RANKING_OFFICIAL_SOURCES:openai.com,anthropic.com,deepmind.google,aws.amazon.com,cloud.google.com,azure.microsoft.com,spring.io,openjdk.org,kubernetes.io}
    priority-entities: ${RANKING_PRIORITY_ENTITIES:openai,chatgpt,gpt,sol,terra,luna,anthropic,claude,google deepmind,gemini,java,spring,kubernetes,aws,azure,gcp}
    launch-keywords: ${RANKING_LAUNCH_KEYWORDS:announces,announce,launch,launches,release,releases,preview,unveil,unveils,introducing,available,generally available}
  watchlist:
    scan-cron: ${WATCHLIST_SCAN_CRON:0 */10 * * * *}
    default-cooldown: ${WATCHLIST_DEFAULT_COOLDOWN:6h}
    max-article-age: ${WATCHLIST_MAX_ARTICLE_AGE:24h}
    min-score: ${WATCHLIST_MIN_SCORE:20}
    max-alerts-per-run: ${WATCHLIST_MAX_ALERTS_PER_RUN:2}
  outbox:
    retry-cron: ${OUTBOX_RETRY_CRON:0 * * * * *}
    max-attempts: ${OUTBOX_MAX_ATTEMPTS:3}
    base-delay: ${OUTBOX_BASE_DELAY:1m}
  evolution:
    base-url: ${EVOLUTION_BASE_URL:}
    api-key: ${EVOLUTION_API_KEY:}
    instance: ${EVOLUTION_INSTANCE:}
    recipient: ${EVOLUTION_RECIPIENT:}
    allowed-sender: ${EVOLUTION_ALLOWED_SENDER:}

---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: ${POSTGRES_JDBC_URL:jdbc:postgresql://localhost:5432/hermes_news}
    username: ${POSTGRES_USER:hermes}
    password: ${POSTGRES_PASSWORD:hermes}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

---
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:h2:mem:hermes_news;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
  ai:
    ollama:
      chat:
        enabled: false

app:
  ai:
    provider: mock
